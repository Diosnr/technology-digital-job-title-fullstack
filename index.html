<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Stack Contributions Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#repos">Repos</a></li>
                <li><a href="#activity">Activity</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h1>Welcome to Full-Stack Contributions Website</h1>
            <p>This website tracks your GitHub contributions and displays them in a beautiful graph.</p>
            <button id="login-btn">Login with GitHub</button>
        </section>
        <section id="repos">
            <h1>Repositories</h1>
            <ul id="repo-list"></ul>
        </section>
        <section id="activity">
            <h1>Activity</h1>
            <ul id="activity-list"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
